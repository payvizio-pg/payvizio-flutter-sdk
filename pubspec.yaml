name: payvizio
description: Flutter wrapper around the Payvizio native Android + iOS SDKs.
version: 0.1.0
homepage: https://payvizio.com

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.payvizio.flutter
        pluginClass: PayvizioPlugin
      ios:
        pluginClass: PayvizioPlugin
